name: LOTP - Bash

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - ".github/workflows/bash.yml"
      - "scripts/build.sh"
      - "scripts/verify.sh"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      -
        name: Run scripts
        run: |
          sh ./scripts/build.sh
          sh ./scripts/verify.sh
        continue-on-error: true
