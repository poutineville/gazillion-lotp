name: LOTP - Pip

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - ".github/workflows/pip.yml"
      - "setup.py"
      - "requirements.txt"
      - "pyproject.toml"
      - "malicious.py"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: python -m pip install --upgrade pip
        continue-on-error: true
      - run: pip install .
        continue-on-error: true
